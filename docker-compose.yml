services:
  neo4j:
    image: neo4j:5.18
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-password}
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p ${NEO4J_PASSWORD:-password} 'RETURN 1'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: interopera
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-interopera}
      POSTGRES_DB: interopera
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "interopera"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    depends_on:
      neo4j:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-password}
      POSTGRES_DSN: postgresql://${POSTGRES_USER:-interopera}:${POSTGRES_PASSWORD:-interopera}@postgres:5432/${POSTGRES_DB:-interopera}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - ./:/app
      - ./out:/app/out
    command: ["bash", "bin/run_all.sh"]

volumes:
  neo4j_data:
  postgres_data:
