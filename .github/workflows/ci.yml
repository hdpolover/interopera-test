name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      neo4j:
        image: neo4j:5.18
        env:
          NEO4J_AUTH: neo4j/password
          NEO4J_PLUGINS: '["apoc"]'
        ports:
          - 7687:7687
          - 7474:7474
        options: >-
          --health-cmd "cypher-shell -u neo4j -p password 'RETURN 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 15
          --health-start-period 40s

      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: interopera
          POSTGRES_PASSWORD: interopera
          POSTGRES_DB: interopera
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U interopera"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install psql client
        run: sudo apt-get install -y postgresql-client

      - name: Init Postgres schema
        run: psql postgresql://interopera:interopera@localhost:5432/interopera -f init.sql

      - name: Run tests
        env:
          NEO4J_TEST_URI: bolt://localhost:7687
          NEO4J_TEST_USER: neo4j
          NEO4J_TEST_PASSWORD: password
          POSTGRES_DSN: postgresql://interopera:interopera@localhost:5432/interopera
        run: python -m pytest -v --tb=short

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: out/
          if-no-files-found: ignore

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install ruff mypy bandit

      - run: python -m ruff check src/ tests/

      - run: python -m mypy src/ --ignore-missing-imports

      - run: bandit -r src/ -ll
